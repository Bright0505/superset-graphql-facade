#
# 本子專案獨立的 docker-compose,不影響 root gt-war-room 的 Superset 開發環境。
#
# 使用方式:
#   cd superset-graphql-facade
#   cp .env.example .env   # 編輯 SUPERSET_PASSWORD 等
#   docker compose up --build
#
# 連線目標:預設 facade 連到外部 Superset (SUPERSET_URL),
#          Redis 在 compose 內 (Phase 2 起使用)。

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: superset-graphql-facade:test
    container_name: superset-graphql-facade-test
    environment:
      NODE_ENV: test
      SUPERSET_URL: http://placeholder
      SUPERSET_USERNAME: test
      SUPERSET_PASSWORD: test
    command: ["npm", "test"]
    profiles:
      - test

  facade:
    build:
      context: .
      dockerfile: Dockerfile
    image: superset-graphql-facade:dev
    container_name: superset-graphql-facade
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - facade-net

  redis:
    image: redis:7-alpine
    container_name: superset-graphql-facade-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - facade-net

networks:
  facade-net:
    driver: bridge
